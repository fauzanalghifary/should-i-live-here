name: Frontend CI

on:
  pull_request:
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "apps/web/**"
      - "nx.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/frontend-ci.yml"
      - "apps/web/**"
      - "nx.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CI: true
      NX_DAEMON: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check frontend formatting
        working-directory: apps/web
        run: pnpm prettier:check

      - name: Lint frontend
        working-directory: apps/web
        run: pnpm lint

      - name: Test frontend
        working-directory: apps/web
        run: pnpm test

      - name: Typecheck frontend
        working-directory: apps/web
        run: pnpm typecheck

      - name: Build frontend
        working-directory: apps/web
        run: pnpm build
