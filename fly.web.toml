app = "should-i-live-here-web"
primary_region = "sin"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  WEB_API_UPSTREAM = "http://should-i-live-here-api.internal:8080"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "5s"
  method = "GET"
  path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
